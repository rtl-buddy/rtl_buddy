site_name: RTL Buddy
site_description: CLI tool for automating tests, regressions, and RTL workflows for Verilog/SystemVerilog codebases.
docs_dir: docs
site_url: https://rtl-buddy.github.io/rtl_buddy/
remote_name: origin
remote_branch: gh-pages

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

use_directory_urls: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

hooks:
  - scripts/gen_cli_reference.py

plugins:
  - search
  - mike:
      alias_type: redirect

nav:
  - Home: index.md
  - Installation: install.md
  - Quick Start: quickstart.md
  - Concepts:
      - Root Config: concepts/root-config.md
      - Tests: concepts/tests.md
      - Regressions: concepts/regressions.md
      - Coverage: concepts/coverage.md
      - Plugins: concepts/plugins.md
  - Reference:
      - CLI: reference/cli.md
      - YAML Formats: reference/yaml.md
  - For Agents: agents.md
  - Migrations:
      - Submodule to uv: migrations/submodule-to-uv.md
  - Known Issues: known-issues.md

extra:
  version:
    provider: mike
    default: latest
