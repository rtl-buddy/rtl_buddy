name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/gen_cli_reference.py'
      - 'scripts/gen_docs_resource.py'
      - 'src/rtl_buddy/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/gen_cli_reference.py'
      - 'scripts/gen_docs_resource.py'
      - 'src/rtl_buddy/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group docs

      - name: Check CLI reference is up to date
        run: uv run python scripts/gen_cli_reference.py --check

      - name: Check packaged docs catalog is up to date
        run: uv run python scripts/gen_docs_resource.py --check

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Check site links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline site/**/*.html
          fail: true

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
