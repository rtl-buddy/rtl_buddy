name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      description:
        description: 'Release description (optional)'
        required: false
        type: string

jobs:
  release:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.pull_request.merge_commit_sha }}

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ inputs.bump }}"
          else
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -qi '"version/major"'; then
              BUMP_TYPE="major"
            elif echo "$LABELS" | grep -qi '"version/minor"'; then
              BUMP_TYPE="minor"
            elif echo "$LABELS" | grep -qi '"version/patch"'; then
              BUMP_TYPE="patch"
            else
              echo "No version label found, skipping release."
              echo "new_tag=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_TAG="v$((MAJOR + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "latest_tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} -> ${NEW_TAG}"

      - name: Create and push tag
        if: steps.version.outputs.new_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" \
            -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.new_tag != ''
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.version.outputs.new_tag }}
          PREV_TAG: ${{ steps.version.outputs.latest_tag }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          DESCRIPTION: ${{ inputs.description }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const tag = process.env.TAG;
            const prevTag = process.env.PREV_TAG;
            let body;
            if (context.eventName === 'workflow_dispatch') {
              body = process.env.DESCRIPTION || `Manual release triggered by @${process.env.ACTOR}`;
            } else {
              body = `**PR #${process.env.PR_NUMBER}** by @${process.env.PR_USER}: ${process.env.PR_TITLE}`;
            }

            if (prevTag && prevTag !== 'v0.0.0') {
              body += `\n\n**Full changelog:** ${process.env.SERVER_URL}/${process.env.REPO}/compare/${prevTag}...${tag}`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body,
              draft: false,
              prerelease: false,
            });

  build:
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rtl_buddy
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
